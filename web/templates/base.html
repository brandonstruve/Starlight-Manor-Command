<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ hub_name }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="header-title">⭐ {{ hub_name }}</h1>
            <div class="header-info">
                <span class="version">v{{ hub_version }}</span>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <a href="{{ url_for('photos.index') }}" class="sidebar-link {% if active_module == 'photos' %}active{% endif %}">
                    <span class="sidebar-icon">📷</span>
                    <span class="sidebar-text">Photos</span>
                </a>
                
                <a href="{{ url_for('homevideos.index') }}" class="sidebar-link {% if active_module == 'homevideos' %}active{% endif %}">
                    <span class="sidebar-icon">🎞️</span>
                    <span class="sidebar-text">Home Media</span>
                </a>

                <a href="{{ url_for('phonevideos.index') }}" class="sidebar-link {% if active_module == 'phonevideos' %}active{% endif %}">
                    <span class="sidebar-icon">📱</span>
                    <span class="sidebar-text">Phone Videos</span>
                </a>
                
                <a href="{{ url_for('music.index') }}" class="sidebar-link {% if active_module == 'music' %}active{% endif %}">
                    <span class="sidebar-icon">🎵</span>
                    <span class="sidebar-text">Music</span>
                </a>
                
                <a href="{{ url_for('people.index') }}" class="sidebar-link {% if active_module == 'people' %}active{% endif %}">
                    <span class="sidebar-icon">👥</span>
                    <span class="sidebar-text">People</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <footer class="footer">
        <p>&copy; {{ now().year }} Starlight Manor Command</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
